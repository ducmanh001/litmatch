allowBuilds:
  '@parcel/watcher': true
  '@scarf/scarf': false
  '@swc/core': true
  # PostHog transitive polyfill chỉ chạy banner tài trợ; app không cần postinstall này.
  core-js: false
  esbuild: true
  less: true
  nx: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
  workerd: true

overrides:
  axios: 1.18.1
  js-yaml: 4.3.0
  brace-expansion: ^2.0.1
  minimatch: ^9.0.5
