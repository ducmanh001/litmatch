# core-api là modular monolith chứa toàn bộ business logic (AGENTS.md luật 1, docs/03 § 3.2) —
# tải chủ yếu là CPU/DB-bound (query, validation, tính toán ledger/matching), không phải giữ
# nhiều connection lâu dài như signaling-gateway — nên request CPU cao hơn, memory vừa phải
# (docs/03 § 3.3). Route `/health/live`, `/health/ready` KHÔNG có global prefix `api/v1` (loại
# trừ tường minh trong core-api main.ts/openapi.ts) — dùng thẳng path này cho probe.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: litmatch
  labels:
    app.kubernetes.io/name: core-api
    app.kubernetes.io/part-of: litmatch
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: core-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: core-api
        app.kubernetes.io/part-of: litmatch
      annotations:
        # /metrics KHÔNG có global prefix api/v1 (openapi.ts API_PREFIX_EXCLUDES) — docs/07 GĐ6
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: /metrics
    spec:
      # Placeholder registry — CI đổi tag theo SHA qua kustomize image transformer (xem
      # kustomization.yaml overlay), không build/push image ở thay đổi này.
      containers:
        - name: core-api
          image: ghcr.io/litmatch/core-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: core-api-config
            - secretRef:
                name: core-api-secrets
          # CPU-bound business logic: request cao hơn signaling-gateway, memory vừa phải cho
          # Node + connection pool DB/Redis/Kafka. Số liệu khởi điểm — CHƯA có benchmark production
          # thật, điều chỉnh theo Giai đoạn 7 khi có traffic thật (docs/03 § 3.8 phân biệt thiết kế
          # vs vận hành thật ở quy mô lớn).
          resources:
            requests:
              cpu: '500m'
              memory: '512Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      terminationGracePeriodSeconds: 30
