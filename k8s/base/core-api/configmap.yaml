# ConfigMap core-api — đối chiếu 1-1 với apps/core-api/src/config/env.validation.ts
# (CoreApiEnv, 86 key). 10 key có bản chất credential/connection-string chứa mật khẩu nằm ở
# secret.yaml (JWT_SECRET, AUTH_OTP_PEPPER, DATABASE_URL, REDIS_URL, ECONOMY_APPLE_SHARED_SECRET,
# ECONOMY_GOOGLE_SA_EMAIL, ECONOMY_GOOGLE_SA_PRIVATE_KEY, ECONOMY_APPLE_PRIVATE_KEY,
# LIVEKIT_API_KEY, LIVEKIT_API_SECRET) — 76 key còn lại (config thường, không nhạy cảm) ở đây.
# Giá trị dưới đây là default/placeholder tham khảo .env.example — SỬA qua overlay
# (configMapGenerator patch hoặc `kubectl edit configmap` sau khi apply) theo môi trường thật,
# không commit giá trị production thật vào git nếu nó chứa domain/thông tin nội bộ nhạy cảm.
apiVersion: v1
kind: ConfigMap
metadata:
  name: core-api-config
  namespace: litmatch
  labels:
    app.kubernetes.io/name: core-api
    app.kubernetes.io/part-of: litmatch
data:
  # --- chung ---
  NODE_ENV: 'production'
  LOG_LEVEL: 'info'
  PORT: '3000'
  # Điểm mở: điền domain FE thật (admin/web) khi có — KHÔNG dùng '*' (docs/05 § 5, security posture)
  CORS_ORIGINS: ''
  SWAGGER_ENABLED: 'false'

  # KAFKA_BROKERS không chứa credential (SASL nếu bật thì phải chuyển sang Secret) — trỏ managed
  # Kafka ngoài cluster, giả định theo yêu cầu task (không deploy Kafka trong k8s manifest này).
  KAFKA_BROKERS: 'kafka.internal:9092'

  # --- auth ---
  JWT_ACCESS_TTL_SECONDS: '900'
  AUTH_REFRESH_TTL_DAYS: '30'
  AUTH_OTP_TTL_SECONDS: '300'
  AUTH_OTP_MAX_ATTEMPTS: '5'
  AUTH_OTP_REQUESTS_PER_HOUR: '5'
  AUTH_MIN_AGE: '18'
  AUTH_GOOGLE_CLIENT_ID: ''
  AUTH_APPLE_CLIENT_ID: ''

  USER_DEFAULT_AVATAR_ID: 'default-01'

  # --- economy ---
  # 'dev' = DevIapVerifier (chặn ở production nếu code enforce) — đổi 'store' khi có credential Apple/Google thật
  ECONOMY_IAP_VERIFIER: 'dev'
  ECONOMY_GOOGLE_PACKAGE_NAME: ''
  ECONOMY_STORE_HTTP_TIMEOUT_MS: '10000'
  ECONOMY_OUTBOX_RELAY_ENABLED: 'false'
  ECONOMY_OUTBOX_RELAY_INTERVAL_MS: '2000'
  ECONOMY_RECONCILIATION_ENABLED: 'true'
  ECONOMY_RECONCILIATION_INTERVAL_MS: '300000'
  ECONOMY_RECONCILIATION_FAST_INTERVAL_MS: '60000'

  # --- economy: refund/chargeback ---
  ECONOMY_APPLE_WEBHOOK_VERIFIER: 'store'
  # PEM "Apple Root CA - G3" — public, không phải bí mật, nhưng để trống ở base vì là blob dài;
  # điền qua overlay/production khi có, không phải giá trị nhạy cảm cần Secret.
  ECONOMY_APPLE_ROOT_CA_PEM: ''
  ECONOMY_GOOGLE_RTDN_VERIFIER: 'store'
  ECONOMY_GOOGLE_RTDN_AUDIENCE: ''
  ECONOMY_GOOGLE_RTDN_SERVICE_ACCOUNT_EMAIL: ''
  ECONOMY_APPLE_ISSUER_ID: ''
  ECONOMY_APPLE_KEY_ID: ''
  ECONOMY_APPLE_BUNDLE_ID: ''
  ECONOMY_APPLE_SERVER_API_ENV: 'production'
  ECONOMY_REFUND_POLL_ENABLED: 'false'
  ECONOMY_REFUND_POLL_INTERVAL_MS: '3600000'
  ECONOMY_REFUND_POLL_WINDOW_DAYS: '60'

  # --- matching (docs/03 § 3.8.B) ---
  MATCHING_MATCHER_INTERVAL_MS: '300'
  MATCHING_MATCHER_BATCH_SIZE: '20'
  MATCHING_SWEEPER_INTERVAL_MS: '5000'
  MATCHING_QUEUE_MAX_WAIT_SECONDS: '120'
  MATCHING_CONFIRM_TIMEOUT_SECONDS: '15'
  MATCHING_AGE_BAND_SIZE: '5'
  MATCHING_SPEEDUP_PRICE_DIAMOND: '50'
  MATCHING_SPEEDUP_MAX_PER_HOUR: '3'
  MATCHING_PRIORITY_BOOST_MS: '300000'
  MATCHING_TRUST_PENALTY_MS_PER_POINT: '2000'
  MATCHING_TRUST_PENALTY_MAX_MS: '120000'

  # --- soul match ---
  SOUL_CHAT_DURATION_SECONDS: '150'
  SOUL_RATING_WINDOW_SECONDS: '120'
  SOUL_CHAT_MESSAGE_MAX_LENGTH: '500'

  # --- friend chat 1-1 ---
  FRIEND_MESSAGE_MAX_LENGTH: '2000'

  # --- livekit (URL thường trỏ Service ClusterIP của media-server trong cùng namespace —
  # xem k8s/base/media-server/service.yaml; key/secret nằm ở Secret vì là credential) ---
  LIVEKIT_URL: 'ws://media-server.litmatch.svc.cluster.local:7880'
  # JSON map region (User.region) → ws/wss URL edge LiveKit theo region (ADR 0005). Rỗng =
  # single-region, mọi client dùng LIVEKIT_URL. Khi bật multi-region, override qua overlay theo
  # region; MỌI URL trong map phải cùng 1 cụm LiveKit (chung Redis) — xem ADR 0005.
  LIVEKIT_REGION_URLS: ''

  # --- calling ---
  CALLING_FREE_CALL_SECONDS: '420'
  CALLING_PRICE_PER_MINUTE_DIAMOND: '0'
  CALLING_PENDING_TIMEOUT_SECONDS: '60'
  CALLING_TICKER_INTERVAL_MS: '1000'
  CALLING_TOKEN_TTL_SECONDS: '120'

  # --- party room (docs/03 § 3.8.A — cap cứng, không nới khi chưa có load test) ---
  PARTY_MAX_SPEAKERS: '8'
  PARTY_MAX_MEMBERS: '100'
  PARTY_TOKEN_TTL_SECONDS: '120'
  PARTY_EMPTY_ROOM_TIMEOUT_SECONDS: '300'
  PARTY_SWEEPER_INTERVAL_MS: '30000'
  PARTY_STALE_ROOM_SECONDS: '120'
  PARTY_TITLE_MAX_LENGTH: '100'

  # --- gift ---
  GIFT_POINTS_RATE_PERCENT: '40'

  # --- safety ---
  SAFETY_REMATCH_COOLDOWN_DAYS: '30'
  SAFETY_REPORT_COOLDOWN_DAYS: '7'
  SAFETY_TRUST_PENALTY_PER_REPORT: '5'
  SAFETY_TRUST_PENALTY_DAILY_CAP: '20'
  SAFETY_TRUST_SCORE_FLOOR: '0'

  # --- notification ---
  # 'dev' = no-op — chưa có credential FCM/APNs thật (nợ kỹ thuật đã ghi ở docs/07 GĐ4)
  NOTIFICATION_PUSH_PROVIDER: 'dev'

  # --- movie match ---
  MOVIE_MATCH_URL_MAX_LENGTH: '2048'
  MOVIE_MATCH_ALLOWED_VIDEO_HOSTS: 'youtube.com,youtu.be'

  # --- palm match ---
  PALM_MATCH_TARGET_NAME_MAX_LENGTH: '50'

  # --- throttle mặc định toàn cục ---
  THROTTLE_TTL_SECONDS: '60'
  THROTTLE_LIMIT: '100'
