# Secret MANIFEST rỗng/placeholder — KHÔNG commit giá trị thật vào git.
# Điền giá trị thật qua sealed-secrets (kubeseal) hoặc Vault (external-secrets-operator) tuỳ hạ
# tầng cluster thật sự dùng — quyết định công cụ quản lý secret cụ thể là điểm mở, chưa chốt ở
# đây (không phải quyết định của thay đổi này). File này chỉ khai đúng TÊN key cần có, đối chiếu
# 1-1 với 11 key "nhạy cảm/chứa credential" trong apps/core-api/src/config/env.validation.ts:
# - JWT_SECRET, AUTH_OTP_PEPPER: secret ký/băm nội bộ
# - DATABASE_URL, REDIS_URL: connection string có thể chứa username/password
# - ECONOMY_APPLE_SHARED_SECRET, ECONOMY_GOOGLE_SA_EMAIL, ECONOMY_GOOGLE_SA_PRIVATE_KEY,
#   ECONOMY_APPLE_PRIVATE_KEY: credential verify/gọi Apple & Google Store API
# - LIVEKIT_API_KEY, LIVEKIT_API_SECRET: credential mint token/control LiveKit — PHẢI khớp giá
#   trị cấu hình trong k8s/base/media-server (xem ghi chú ở đó, cùng vấn đề "key nằm trong file
#   cấu hình LiveKit" chưa có giải pháp gọn — ghi ở k8s/README.md).
# - AUTH_FACEBOOK_APP_SECRET: chỉ dùng server-side để debug access token Facebook.
apiVersion: v1
kind: Secret
metadata:
  name: core-api-secrets
  namespace: litmatch
  labels:
    app.kubernetes.io/name: core-api
    app.kubernetes.io/part-of: litmatch
  annotations:
    litmatch.dev/managed-by: 'điền qua sealed-secrets hoặc Vault, KHÔNG commit giá trị thật'
type: Opaque
stringData:
  JWT_SECRET: 'REPLACE_ME'
  AUTH_OTP_PEPPER: 'REPLACE_ME'
  DATABASE_URL: 'REPLACE_ME'
  REDIS_URL: 'REPLACE_ME'
  ECONOMY_APPLE_SHARED_SECRET: 'REPLACE_ME'
  ECONOMY_GOOGLE_SA_EMAIL: 'REPLACE_ME'
  ECONOMY_GOOGLE_SA_PRIVATE_KEY: 'REPLACE_ME'
  ECONOMY_APPLE_PRIVATE_KEY: 'REPLACE_ME'
  LIVEKIT_API_KEY: 'REPLACE_ME'
  LIVEKIT_API_SECRET: 'REPLACE_ME'
  AUTH_FACEBOOK_APP_SECRET: 'REPLACE_ME'
