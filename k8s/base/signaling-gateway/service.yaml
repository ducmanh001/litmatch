# ClusterIP nội bộ. Expose ra ngoài cluster đi qua nginx-ingress (ingress.yaml cùng thư mục —
# ADR 0004, docs/adr/0004-api-gateway-nginx-ingress.md).
apiVersion: v1
kind: Service
metadata:
  name: signaling-gateway
  namespace: litmatch
  labels:
    app.kubernetes.io/name: signaling-gateway
    app.kubernetes.io/part-of: litmatch
spec:
  type: ClusterIP
  # Sticky session cho Socket.IO polling đã chốt ở tầng Ingress bằng cookie affinity
  # (ingress.yaml — ADR 0004); Service giữ None, không stack 2 tầng affinity chồng nhau.
  sessionAffinity: None
  selector:
    app.kubernetes.io/name: signaling-gateway
  ports:
    - name: http
      port: 3001
      targetPort: http
