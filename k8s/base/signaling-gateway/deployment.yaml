# signaling-gateway scale theo số KẾT NỐI ĐỒNG THỜI (Socket.IO), không phải theo CPU nghiệp vụ
# (docs/03 § 3.3: "khác hẳn quy luật scale CPU/DB-bound của phần business logic") — vì vậy CPU
# request thấp hơn hẳn core-api, nhưng memory request CAO hơn tỉ lệ để giữ object socket/buffer
# cho nhiều connection đồng thời trong bộ nhớ Node process. Số fd (file descriptor) mở theo số
# socket cũng tăng tương ứng — hầu hết container runtime hiện đại (containerd/docker) đã đặt
# ulimit nofile mặc định khá cao; Kubernetes Pod spec không có field ulimits native, nếu cluster
# thật giới hạn thấp hơn cần chỉnh ở containerd/node level (ngoài phạm vi manifest ứng dụng này) —
# ghi làm điểm cần xác minh khi có traffic thật, không giả định trước.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-gateway
  namespace: litmatch
  labels:
    app.kubernetes.io/name: signaling-gateway
    app.kubernetes.io/part-of: litmatch
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: signaling-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: signaling-gateway
        app.kubernetes.io/part-of: litmatch
      annotations:
        # docs/07 GĐ6 — /metrics không cần @Public()/JWT (gateway không có guard auth global trên HTTP)
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3001'
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: signaling-gateway
          image: ghcr.io/litmatch/signaling-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          envFrom:
            - configMapRef:
                name: signaling-gateway-config
            - secretRef:
                name: signaling-gateway-secrets
          # Connection-bound: CPU thấp, memory cao hơn tỉ lệ so với core-api (giữ state nhiều
          # socket). Số liệu khởi điểm — cần benchmark connection/pod thật (loadtest/signaling-ws.js
          # hoặc Artillery, xem loadtest/README.md) trước khi tin số liệu này ở production.
          resources:
            requests:
              cpu: '100m'
              memory: '768Mi'
            limits:
              cpu: '300m'
              memory: '1536Mi'
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      # Socket.IO client cần thời gian reconnect vào pod khác khi pod bị drain — grace period dài
      # hơn core-api để giảm đột ngột drop hàng loạt connection lúc rolling update.
      terminationGracePeriodSeconds: 60
