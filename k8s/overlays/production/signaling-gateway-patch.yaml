apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-gateway
  namespace: litmatch
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: signaling-gateway
          resources:
            requests:
              cpu: '150m'
              memory: '1Gi'
            limits:
              cpu: '400m'
              memory: '2Gi'
