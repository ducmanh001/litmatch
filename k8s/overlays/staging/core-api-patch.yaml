# Staging: đủ để test tải nhẹ + rollout, không cần chịu traffic thật — replica/resource thấp hơn
# production để tiết kiệm chi phí cluster staging.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: litmatch
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: core-api
          resources:
            requests:
              cpu: '250m'
              memory: '384Mi'
            limits:
              cpu: '500m'
              memory: '768Mi'
