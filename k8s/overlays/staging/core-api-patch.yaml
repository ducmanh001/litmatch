# Staging: đủ để test tải nhẹ + rollout, không cần chịu traffic thật — replica/resource thấp hơn
# production để tiết kiệm chi phí cluster staging.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
  namespace: litmatch
spec:
  replicas: 1
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: core-api
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: '250m'
              memory: '384Mi'
            limits:
              cpu: '500m'
              memory: '768Mi'
