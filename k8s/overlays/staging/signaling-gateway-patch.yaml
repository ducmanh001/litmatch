apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-gateway
  namespace: litmatch
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: signaling-gateway
          resources:
            requests:
              cpu: '100m'
              memory: '384Mi'
            limits:
              cpu: '250m'
              memory: '768Mi'
