# media-server luôn replicas: 1 (giới hạn networking, xem base deployment.yaml) — overlay staging
# chỉ hạ resource, không đổi replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server
  namespace: litmatch
spec:
  template:
    spec:
      containers:
        - name: media-server
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
