# media-server luôn replicas: 1 (giới hạn networking, xem base deployment.yaml) — overlay staging
# chỉ hạ resource, không đổi replicas.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: media-server
  namespace: litmatch
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: media-server
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            privileged: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: '250m'
              memory: '512Mi'
            limits:
              cpu: '1'
              memory: '1Gi'
