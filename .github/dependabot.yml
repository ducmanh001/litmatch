version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns: ['@nestjs/*', 'nestjs-*']
      nx:
        patterns: ['@nx/*', 'nx']
      test-tooling:
        patterns:
          ['jest*', '@types/jest', 'ts-jest', 'supertest', '@types/supertest']
      lint-and-format:
        patterns: ['eslint*', 'typescript-eslint', 'prettier']

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:30'
      timezone: Asia/Ho_Chi_Minh
    groups:
      actions:
        patterns: ['*']

  - package-ecosystem: devcontainers
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:45'
      timezone: Asia/Ho_Chi_Minh

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Asia/Ho_Chi_Minh

  - package-ecosystem: docker
    directory: /apps/core-api
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Asia/Ho_Chi_Minh

  - package-ecosystem: docker
    directory: /apps/signaling-gateway
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Asia/Ho_Chi_Minh

  - package-ecosystem: docker
    directory: /apps/media-server
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Asia/Ho_Chi_Minh
