name: Security

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:
  schedule:
    - cron: '17 20 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4

  repository-scan:
    name: Secrets and dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks (verified checksum)
        run: node scripts/ci/security-tools.mjs gitleaks --install-dir /tmp/litmatch-ci-tools --add-to-github-path

      - name: Scan Git history for secrets
        run: gitleaks git --redact --no-banner --verbose --baseline-path .gitleaks-baseline.json .

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit high and critical dependency vulnerabilities
        run: pnpm audit --audit-level high

      # Bootstrap CLI trực tiếp có kiểm SHA; cố ý không dùng trivy-action.
      - name: Install Trivy (verified checksum)
        run: node scripts/ci/security-tools.mjs trivy --install-dir /tmp/litmatch-ci-tools --add-to-github-path

      - name: Scan filesystem vulnerabilities and misconfiguration
        run: >-
          trivy filesystem .
          --scanners vuln,misconfig
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          --no-progress
          --skip-version-check
          --ignorefile .trivyignore.yaml
          --skip-dirs .nx
          --skip-dirs dist

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          show-openssf-scorecard: true
          warn-on-openssf-scorecard-level: 3

  required:
    name: Security required
    if: always()
    needs: [codeql, repository-scan, dependency-review]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every applicable security stage
        env:
          CODEQL_RESULT: ${{ needs.codeql.result }}
          REPOSITORY_SCAN_RESULT: ${{ needs.repository-scan.result }}
          DEPENDENCY_REVIEW_RESULT: ${{ needs.dependency-review.result }}
        run: |
          if [[ "${CODEQL_RESULT}" != success \
            || "${REPOSITORY_SCAN_RESULT}" != success ]]; then
            echo "::error::Security incomplete: codeql=${CODEQL_RESULT}, repository-scan=${REPOSITORY_SCAN_RESULT}"
            exit 1
          fi

          if [[ "${DEPENDENCY_REVIEW_RESULT}" != success \
            && "${DEPENDENCY_REVIEW_RESULT}" != skipped ]]; then
            echo "::error::Dependency review failed: ${DEPENDENCY_REVIEW_RESULT}"
            exit 1
          fi
