name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 20 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4

  repository-scan:
    name: Secrets and dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks (verified checksum)
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install -m 0755 /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Scan Git history for secrets
        run: gitleaks git --redact --no-banner --verbose .

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit high and critical dependency vulnerabilities
        run: pnpm audit --audit-level high

      # Install the CLI directly and verify it. This deliberately avoids trivy-action because
      # its tags were affected by the March 2026 supply-chain incident.
      - name: Install Trivy (verified checksum)
        env:
          TRIVY_VERSION: 0.72.0
          TRIVY_SHA256: bbb64b9695866ce4a7a8f5c9592002c5961cab378577fa3f8a040df362b9b2ea
        run: |
          curl --fail --silent --show-error --location \
            --output /tmp/trivy.tar.gz \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum --check --strict
          tar -xzf /tmp/trivy.tar.gz -C /tmp trivy
          sudo install -m 0755 /tmp/trivy /usr/local/bin/trivy

      - name: Scan filesystem vulnerabilities and misconfiguration
        run: >-
          trivy filesystem .
          --scanners vuln,misconfig
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          --no-progress
          --skip-version-check
          --skip-dirs .nx
          --skip-dirs dist
