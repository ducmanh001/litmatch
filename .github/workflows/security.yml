name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '17 20 * * 1'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@1ad29ea4a422cce9a242a9fae469541dcd08addc # v4

  repository-scan:
    name: Secrets and dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks (verified checksum)
        run: node scripts/ci/security-tools.mjs gitleaks --install-dir /tmp/litmatch-ci-tools --add-to-github-path

      - name: Scan Git history for secrets
        run: gitleaks git --redact --no-banner --verbose --baseline-path .gitleaks-baseline.json .

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Audit high and critical dependency vulnerabilities
        run: pnpm audit --audit-level high

      # Bootstrap CLI trực tiếp có kiểm SHA; cố ý không dùng trivy-action.
      - name: Install Trivy (verified checksum)
        run: node scripts/ci/security-tools.mjs trivy --install-dir /tmp/litmatch-ci-tools --add-to-github-path

      - name: Scan filesystem vulnerabilities and misconfiguration
        run: >-
          trivy filesystem .
          --scanners vuln,misconfig
          --severity HIGH,CRITICAL
          --ignore-unfixed
          --exit-code 1
          --no-progress
          --skip-version-check
          --ignorefile .trivyignore.yaml
          --skip-dirs .nx
          --skip-dirs dist
