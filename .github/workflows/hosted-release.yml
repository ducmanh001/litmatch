name: Hosted release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: Full commit SHA already green in CI
        required: true
        type: string

concurrency:
  group: hosted-production
  cancel-in-progress: false

permissions:
  checks: read
  contents: read

jobs:
  deploy:
    if: >-
      vars.HOSTED_RELEASE_ENABLED == 'true' &&
      (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_SHA: ${{ inputs.sha || github.event.workflow_run.head_sha }}
      GH_TOKEN: ${{ github.token }}
      NORTHFLANK_API_TOKEN: ${{ secrets.NORTHFLANK_API_TOKEN }}
      NORTHFLANK_PROJECT_ID: ${{ vars.NORTHFLANK_PROJECT_ID }}
      NORTHFLANK_CORE_SERVICE_ID: ${{ vars.NORTHFLANK_CORE_SERVICE_ID }}
      NORTHFLANK_SIGNALING_SERVICE_ID: ${{ vars.NORTHFLANK_SIGNALING_SERVICE_ID }}
      DATABASE_URL: ${{ secrets.HOSTED_DATABASE_URL }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
      NEXT_PUBLIC_SOCKET_URL: ${{ vars.PUBLIC_SIGNALING_URL }}
      NEXT_PUBLIC_LIVEKIT_URL: ${{ vars.PUBLIC_LIVEKIT_URL }}
      NEXT_PUBLIC_AUTH_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      NEXT_PUBLIC_AUTH_APPLE_CLIENT_ID: ''
      NEXT_PUBLIC_PHONE_OTP_ENABLED: 'false'
      VITE_API_URL: ${{ vars.PUBLIC_API_URL }}
      VITE_AUTH_GOOGLE_CLIENT_ID: ${{ vars.GOOGLE_OAUTH_CLIENT_ID }}
      VITE_PHONE_OTP_ENABLED: 'false'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.RELEASE_SHA }}
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Require a green CI gate for this commit
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [[ ! "${RELEASE_SHA}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::sha must be a full Git commit SHA"
            exit 1
          fi
          conclusion="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RELEASE_SHA}/check-runs" \
            --jq '.check_runs[] | select(.name == "CI required") | .conclusion' | tail -n 1)"
          test "${conclusion}" = success
      - run: pnpm install --no-frozen-lockfile
      - name: Run forward-only database migrations
        run: pnpm nx run core-api:migration-run --skip-nx-cache
      - name: Deploy backend services from the green commit
        run: node scripts/release/northflank-deploy.mjs
      - name: Deploy web and admin
        run: pnpm nx run-many -t cloudflare-deploy -p web,admin --parallel=1 --skip-nx-cache
      - name: Smoke public endpoints
        env:
          PUBLIC_API_URL: ${{ vars.PUBLIC_API_URL }}
          PUBLIC_SIGNALING_URL: ${{ vars.PUBLIC_SIGNALING_URL }}
          PUBLIC_WEB_URL: ${{ vars.PUBLIC_WEB_URL }}
          PUBLIC_ADMIN_URL: ${{ vars.PUBLIC_ADMIN_URL }}
        run: |
          smoke() {
            local url="$1"
            for _ in {1..30}; do
              if curl --fail --silent --show-error "${url}" >/dev/null; then
                return 0
              fi
              sleep 10
            done
            echo "::error::Smoke failed: ${url}"
            return 1
          }
          smoke "${PUBLIC_API_URL}/health/ready"
          smoke "${PUBLIC_SIGNALING_URL}/health/ready"
          smoke "${PUBLIC_WEB_URL}/"
          smoke "${PUBLIC_ADMIN_URL}/login"
