name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JWT_SECRET: ci-only-secret-0123456789abcdef-xyz
  AUTH_OTP_PEPPER: ci-only-pepper-0123456789
  DATABASE_URL: postgresql://litmatch:litmatch_local@localhost:5432/litmatch
  REDIS_URL: redis://localhost:6379/15
  NEXT_PUBLIC_API_URL: http://localhost:3000
  NEXT_PUBLIC_SOCKET_URL: http://localhost:3001
  NEXT_PUBLIC_LIVEKIT_URL: ws://localhost:7880

jobs:
  quality:
    name: Format and lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Local-equivalent quality preflight
        env:
          AGENT_BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: pnpm ci:local:quick

  test:
    name: Test, build and e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: litmatch
          POSTGRES_PASSWORD: litmatch_local
          POSTGRES_DB: litmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U litmatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      INTEGRATION_DB_URL: postgresql://litmatch:litmatch_local@localhost:5432/litmatch_test
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Frontend contract, tests, builds and bundle audit
        run: pnpm agent:verify frontend
      - name: Unit and integration tests with coverage gate
        run: pnpm nx run-many -t test --coverage --exclude=admin,web,api-client
      - run: pnpm nx run-many -t build --exclude=admin,web,api-client
      - name: End-to-end smoke tests
        run: pnpm nx run-many -t e2e --parallel=2
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ github.run_id }}
          path: coverage/
          if-no-files-found: warn
          retention-days: 7

  docker:
    name: Container build and runtime smoke
    needs: [quality, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: litmatch
          POSTGRES_PASSWORD: litmatch_local
          POSTGRES_DB: litmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U litmatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.9.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm nx run-many -t build
      - run: pnpm db:migrate

      - name: Build images
        run: |
          docker build -f apps/core-api/Dockerfile -t litmatch/core-api:${{ github.sha }} .
          docker build -f apps/signaling-gateway/Dockerfile -t litmatch/signaling-gateway:${{ github.sha }} .

      - name: Install Trivy (verified checksum)
        run: node scripts/ci/security-tools.mjs trivy --install-dir /tmp/litmatch-ci-tools --add-to-github-path

      - name: Scan runtime images
        run: |
          trivy image litmatch/core-api:${{ github.sha }} --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress --skip-version-check
          trivy image litmatch/signaling-gateway:${{ github.sha }} --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 --no-progress --skip-version-check
          trivy image litmatch/core-api:${{ github.sha }} --scanners vuln --format cyclonedx --output core-api.cdx.json --skip-version-check
          trivy image litmatch/signaling-gateway:${{ github.sha }} --scanners vuln --format cyclonedx --output signaling-gateway.cdx.json --skip-version-check

      - name: Upload image SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-sboms-${{ github.run_id }}
          path: '*.cdx.json'
          if-no-files-found: error
          retention-days: 30

      - name: Start images and verify health endpoints
        env:
          CORE_IMAGE: litmatch/core-api:${{ github.sha }}
          SIGNALING_IMAGE: litmatch/signaling-gateway:${{ github.sha }}
        run: |
          trap 'docker rm --force litmatch-core-smoke litmatch-signaling-smoke >/dev/null 2>&1 || true' EXIT

          # The production bundle uses test config until a real SMS provider is available;
          # core-api intentionally refuses to boot production with DevSmsProvider.
          docker run --detach --name litmatch-core-smoke --network host \
            --env NODE_ENV=test \
            --env DATABASE_URL="${DATABASE_URL}" \
            --env REDIS_URL="${REDIS_URL}" \
            --env JWT_SECRET="${JWT_SECRET}" \
            --env AUTH_OTP_PEPPER="${AUTH_OTP_PEPPER}" \
            "${CORE_IMAGE}"
          docker run --detach --name litmatch-signaling-smoke --network host \
            --env NODE_ENV=production \
            --env JWT_SECRET="${JWT_SECRET}" \
            --env REDIS_URL="${REDIS_URL}" \
            "${SIGNALING_IMAGE}"

          for _ in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/health/ready >/dev/null \
              && curl --fail --silent http://127.0.0.1:3001/health/ready >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs litmatch-core-smoke
          docker logs litmatch-signaling-smoke
          exit 1

  required:
    name: CI required
    if: always()
    needs: [quality, test, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Require every CI stage
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
          TEST_RESULT: ${{ needs.test.result }}
          DOCKER_RESULT: ${{ needs.docker.result }}
        run: |
          if [[ "${QUALITY_RESULT}" != success \
            || "${TEST_RESULT}" != success \
            || "${DOCKER_RESULT}" != success ]]; then
            echo "::error::CI incomplete: quality=${QUALITY_RESULT}, test=${TEST_RESULT}, docker=${DOCKER_RESULT}"
            exit 1
          fi
