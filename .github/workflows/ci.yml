name: CI

on:
  push:
    branches: ['master', 'main']
  pull_request:

env:
  JWT_SECRET: ci-only-secret-0123456789abcdef-xyz
  AUTH_OTP_PEPPER: ci-only-pepper-0123456789
  DATABASE_URL: postgresql://litmatch:litmatch_local@localhost:5432/litmatch

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: litmatch
          POSTGRES_PASSWORD: litmatch_local
          POSTGRES_DB: litmatch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U litmatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      INTEGRATION_DB_URL: postgresql://litmatch:litmatch_local@localhost:5432/litmatch_test
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm nx run-many -t lint

      - name: Unit test (kèm arch test module boundaries)
        run: pnpm nx run-many -t test

      - name: Build
        run: pnpm nx run-many -t build

      - name: End-to-end smoke test
        run: pnpm nx run-many -t e2e --parallel=2

  docker:
    # Build image để xác nhận Dockerfile luôn hợp lệ — push registry cấu hình ở Giai đoạn 6 (K8s)
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build deploy artefacts (webpack generatePackageJson tạo sẵn package.json + lockfile pruned trong dist)
        run: pnpm nx run-many -t build

      - name: Build docker images
        run: |
          docker build -f apps/core-api/Dockerfile -t litmatch/core-api:${{ github.sha }} .
          docker build -f apps/signaling-gateway/Dockerfile -t litmatch/signaling-gateway:${{ github.sha }} .
