<!doctype html>
<html lang="vi" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Litmatch — Tâm sự đêm khuya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --ink: 27 20 32;
        --surf: 36 27 41;
        --surf2: 74 46 69;
        --paper: 251 243 239;
        --iris: 232 87 124;
        --irisl: 232 87 124;
        --aqua: 242 166 90;
        --aqual: 242 166 90;
        --diamond: 79 195 217;
      }
      html[data-theme='orange'] {
        --ink: 16 11 9;
        --surf: 29 22 19;
        --surf2: 42 33 29;
        --paper: 248 244 242;
        --iris: 232 67 31;
        --irisl: 255 90 54;
        --aqua: 224 136 21;
        --aqual: 245 164 40;
      }
      .theme-dot {
        transition: transform 0.15s ease;
      }
      .theme-dot[data-active='true'] {
        box-shadow:
          0 0 0 2px rgb(var(--paper)),
          0 0 0 3px rgb(var(--irisl));
      }
    </style>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              ink: 'rgb(var(--ink) / <alpha-value>)',
              surf: 'rgb(var(--surf) / <alpha-value>)',
              surf2: 'rgb(var(--surf2) / <alpha-value>)',
              paper: 'rgb(var(--paper) / <alpha-value>)',
              iris: 'rgb(var(--iris) / <alpha-value>)',
              irisl: 'rgb(var(--irisl) / <alpha-value>)',
              aqua: 'rgb(var(--aqua) / <alpha-value>)',
              aqual: 'rgb(var(--aqual) / <alpha-value>)',
              diamond: 'rgb(var(--diamond) / <alpha-value>)',
            },
            fontFamily: {
              display: ['Fraunces', 'serif'],
              body: ['"Be Vietnam Pro"', 'sans-serif'],
              mono: ['"IBM Plex Mono"', 'monospace'],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,600;1,500;1,600&family=Be+Vietnam+Pro:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: 'Be Vietnam Pro', sans-serif;
      }
      .font-display {
        font-family: 'Fraunces', serif;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      @keyframes speakPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.55;
        }
        50% {
          transform: scale(1.15);
          opacity: 0.15;
        }
      }
      .speak-ring {
        position: absolute;
        inset: -4px;
        border-radius: 9999px;
        background: linear-gradient(
          135deg,
          rgb(var(--irisl)),
          rgb(var(--aqual))
        );
        animation: speakPulse 1.6s ease-in-out infinite;
        z-index: 0;
      }
    </style>
  </head>
  <body
    class="bg-paper dark:bg-ink md:bg-slate-100 md:dark:bg-black text-slate-900 dark:text-slate-50 transition-colors duration-300"
  >
    <div
      data-lm-frame
      class="max-w-[430px] md:max-w-xl mx-auto h-screen relative flex flex-col md:my-6 md:h-[calc(100vh_-_3rem)] md:rounded-[2rem] md:border md:border-black/10 md:dark:border-white/10 md:shadow-2xl md:shadow-black/10 md:overflow-hidden"
    >
      <div class="flex justify-end px-5 pt-3">
        <div
          class="flex items-center gap-1.5 bg-white dark:bg-surf border border-black/5 dark:border-white/10 rounded-full p-1.5"
          role="group"
          aria-label="Chọn giao diện màu"
        >
          <button
            onclick="setTheme('pink')"
            data-theme-btn="pink"
            data-active="true"
            class="theme-dot w-4 h-4 rounded-full"
            style="background: #e8577c"
            aria-label="Giao diện hồng"
          ></button>
          <button
            onclick="setTheme('orange')"
            data-theme-btn="orange"
            data-active="false"
            class="theme-dot w-4 h-4 rounded-full"
            style="background: linear-gradient(135deg, #ff5a36, #e08815)"
            aria-label="Giao diện cam"
          ></button>
          <button
            onclick="setTheme('white')"
            data-theme-btn="white"
            data-active="false"
            class="theme-dot w-4 h-4 rounded-full border border-black/10"
            style="background: #fbf3ef"
            aria-label="Giao diện trắng"
          ></button>
        </div>
      </div>

      <div class="flex items-center justify-between px-5 pt-6 pb-3 shrink-0">
        <div>
          <p class="font-bold text-sm">Tâm sự đêm khuya 🌙</p>
          <p
            class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1"
          >
            <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>24
            người đang nghe
          </p>
        </div>
        <button
          onclick="confirmLeaveRoom()"
          class="px-4 py-2 rounded-full text-xs font-bold bg-slate-100 dark:bg-surf2"
        >
          Rời phòng
        </button>
      </div>

      <div class="px-6 pb-3 shrink-0">
        <div class="flex flex-col items-center mb-4">
          <div class="relative w-20 h-20 mb-2 flex items-center justify-center">
            <div class="speak-ring"></div>
            <img
              src="https://api.dicebear.com/7.x/adventurer/svg?seed=HostMai"
              class="w-20 h-20 rounded-full border-2 border-white dark:border-ink relative z-10"
            />
            <span
              class="absolute -bottom-1 right-0 bg-gradient-to-br from-irisl to-irisl text-white text-[9px] font-extrabold px-2 py-0.5 rounded-full z-20"
              >HOST</span
            >
          </div>
          <p class="text-xs font-bold">Mai</p>
        </div>

        <div class="grid grid-cols-3 lg:grid-cols-4 gap-x-4 gap-y-3">
          <div class="flex flex-col items-center">
            <div
              class="relative w-14 h-14 mb-1 flex items-center justify-center"
            >
              <div class="speak-ring"></div>
              <img
                src="https://api.dicebear.com/7.x/adventurer/svg?seed=P2"
                class="w-14 h-14 rounded-full border-2 border-white dark:border-ink relative z-10"
              />
            </div>
            <p class="text-[11px] font-semibold truncate w-16 text-center">
              Long
            </p>
          </div>
          <div class="flex flex-col items-center">
            <div
              class="w-14 h-14 mb-1 rounded-full border-2 border-dashed border-slate-300 dark:border-white/15 flex items-center justify-center text-slate-300 dark:text-white/20"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 5v14M5 12h14" stroke-linecap="round" />
              </svg>
            </div>
            <p class="text-[11px] text-slate-400">Trống</p>
          </div>
          <div class="flex flex-col items-center">
            <div
              class="relative w-14 h-14 mb-1 flex items-center justify-center"
            >
              <img
                src="https://api.dicebear.com/7.x/adventurer/svg?seed=P4"
                class="w-14 h-14 rounded-full border-2 border-white dark:border-ink opacity-70"
              />
              <span
                class="absolute -bottom-0.5 -right-0.5 w-5 h-5 rounded-full bg-slate-500 flex items-center justify-center z-10"
                ><svg width="10" height="10" viewBox="0 0 24 24" fill="white">
                  <path
                    d="M16.5 12c0-.2 0-.4-.05-.6l2-2-1.4-1.4-2 2A4.5 4.5 0 0012 8.5V4h-2v4.5c-.5.1-.9.3-1.3.5L4.4 4.7 3 6.1l4.3 4.3A4.5 4.5 0 007.5 12c0 .2 0 .4.05.6l-2 2 1.4 1.4 2-2c.4.2.8.4 1.3.5V19h2v-4.5c2-.4 3.5-2.3 3.5-4.5z"
                  /></svg
              ></span>
            </div>
            <p class="text-[11px] font-semibold truncate w-16 text-center">
              Hương
            </p>
          </div>
          <div class="flex flex-col items-center">
            <div
              class="w-14 h-14 mb-1 rounded-full border-2 border-dashed border-slate-300 dark:border-white/15 flex items-center justify-center text-slate-300 dark:text-white/20"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 5v14M5 12h14" stroke-linecap="round" />
              </svg>
            </div>
            <p class="text-[11px] text-slate-400">Trống</p>
          </div>
          <div class="flex flex-col items-center">
            <div
              class="relative w-14 h-14 mb-1 flex items-center justify-center"
            >
              <div class="speak-ring"></div>
              <img
                src="https://api.dicebear.com/7.x/adventurer/svg?seed=P6"
                class="w-14 h-14 rounded-full border-2 border-white dark:border-ink relative z-10"
              />
            </div>
            <p class="text-[11px] font-semibold truncate w-16 text-center">
              Tùng
            </p>
          </div>
          <div class="flex flex-col items-center">
            <div
              class="w-14 h-14 mb-1 rounded-full border-2 border-dashed border-slate-300 dark:border-white/15 flex items-center justify-center text-slate-300 dark:text-white/20"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M12 5v14M5 12h14" stroke-linecap="round" />
              </svg>
            </div>
            <p class="text-[11px] text-slate-400">Trống</p>
          </div>
        </div>
      </div>

      <div
        id="roomChatLog"
        class="flex-1 min-h-0 overflow-y-auto px-5 py-2 space-y-2"
      >
        <p class="text-xs">
          <span class="font-bold">Mai (Host):</span>
          <span class="text-slate-500 dark:text-slate-400"
            >chào mừng mọi người đến phòng nha 💜</span
          >
        </p>
        <p class="text-xs">
          <span class="font-bold">Long:</span>
          <span class="text-slate-500 dark:text-slate-400"
            >mọi người dạo này sao rồi 😄</span
          >
        </p>
        <p
          class="text-xs bg-diamond/10 text-sky-700 dark:text-diamond rounded-lg px-2 py-1 inline-block"
        >
          🎁 Hương đã tặng Mai 1 Hoa hồng
        </p>
        <p class="text-xs">
          <span class="font-bold">Tùng:</span>
          <span class="text-slate-500 dark:text-slate-400"
            >nay phòng đông vui ghê</span
          >
        </p>
        <p class="text-xs">
          <span class="font-bold">Long:</span>
          <span class="text-slate-500 dark:text-slate-400"
            >ai hát bài gì đi mọi người ơi 🎤</span
          >
        </p>
      </div>

      <div id="giftPanel" class="hidden px-5 pb-2 shrink-0">
        <div
          class="flex gap-3 overflow-x-auto no-scrollbar bg-white dark:bg-surf rounded-2xl p-3 border border-black/5 dark:border-white/5"
        >
          <button
            onclick="sendGift('🌹', 'Hoa hồng', 10)"
            class="shrink-0 flex flex-col items-center gap-1 w-16 hover:scale-105 transition"
          >
            <span class="text-2xl">🌹</span
            ><span class="text-[10px] font-bold">10 💎</span>
          </button>
          <button
            onclick="sendGift('🎂', 'Bánh sinh nhật', 50)"
            class="shrink-0 flex flex-col items-center gap-1 w-16 hover:scale-105 transition"
          >
            <span class="text-2xl">🎂</span
            ><span class="text-[10px] font-bold">50 💎</span>
          </button>
          <button
            onclick="sendGift('🚗', 'Siêu xe', 500)"
            class="shrink-0 flex flex-col items-center gap-1 w-16 hover:scale-105 transition"
          >
            <span class="text-2xl">🚗</span
            ><span class="text-[10px] font-bold">500 💎</span>
          </button>
          <button
            onclick="sendGift('👑', 'Vương miện', 1000)"
            class="shrink-0 flex flex-col items-center gap-1 w-16 hover:scale-105 transition"
          >
            <span class="text-2xl">👑</span
            ><span class="text-[10px] font-bold">1000 💎</span>
          </button>
        </div>
      </div>

      <div
        class="px-5 py-4 border-t border-black/5 dark:border-white/5 flex items-center gap-2 shrink-0"
      >
        <button
          id="micBtn"
          onclick="toggleMic()"
          class="w-11 h-11 rounded-full bg-slate-100 dark:bg-surf2 flex items-center justify-center shrink-0"
        >
          <svg
            id="micIcon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z" />
            <path
              d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <input
          id="roomChatInput"
          type="text"
          placeholder="Chat trong phòng..."
          class="flex-1 px-4 py-3 rounded-full bg-slate-100 dark:bg-surf2 text-sm outline-none focus:ring-2 focus:ring-iris"
        />
        <button
          onclick="toggleGift()"
          class="w-11 h-11 rounded-full bg-gradient-to-br from-irisl to-irisl flex items-center justify-center shrink-0 text-lg"
        >
          🎁
        </button>
      </div>
    </div>

    <script>
      function toggleGift() {
        document.getElementById('giftPanel').classList.toggle('hidden');
      }
      let micOn = false;
      function toggleMic() {
        micOn = !micOn;
        const btn = document.getElementById('micBtn');
        btn.classList.toggle('bg-gradient-to-br', micOn);
        btn.classList.toggle('from-irisl', micOn);
        btn.classList.toggle('to-irisl', micOn);
        btn.classList.toggle('text-white', micOn);
        btn.classList.toggle('bg-slate-100', !micOn);
        btn.classList.toggle('dark:bg-surf2', !micOn);
        lmToast(micOn ? 'Đã bật mic' : 'Đã tắt mic');
      }
      function appendRoomMessage(contentNode) {
        var log = document.getElementById('roomChatLog');
        var p = document.createElement('p');
        p.className = 'text-xs';
        p.appendChild(contentNode);
        log.appendChild(p);
        log.scrollTop = log.scrollHeight;
      }
      var roomChatInput = document.getElementById('roomChatInput');
      roomChatInput.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && roomChatInput.value.trim()) {
          var wrapper = document.createElement('span');

          var sender = document.createElement('span');
          sender.className = 'font-bold';
          sender.textContent = 'Bạn:';

          var spacer = document.createTextNode(' ');

          var message = document.createElement('span');
          message.className = 'text-slate-500 dark:text-slate-400';
          message.textContent = roomChatInput.value.trim();

          wrapper.appendChild(sender);
          wrapper.appendChild(spacer);
          wrapper.appendChild(message);

          appendRoomMessage(wrapper);
          roomChatInput.value = '';
        }
      });
      function sendGift(emoji, name, cost) {
        var gift = document.createElement('span');
        gift.className =
          'bg-diamond/10 text-sky-700 dark:text-diamond rounded-lg px-2 py-1 inline-block';
        gift.textContent = emoji + ' Bạn đã tặng Mai 1 ' + name;

        appendRoomMessage(gift);
        toggleGift();
        lmToast('Đã tặng ' + name + ' — trừ ' + cost + ' 💎');
      }
      function confirmLeaveRoom() {
        lmConfirm(
          'Rời phòng?',
          'Bạn là chủ phòng — rời đi sẽ đóng phòng cho tất cả 24 người đang nghe.',
          function () {
            window.location.href = 'party-list.html';
          },
          { tone: 'danger', actionLabel: 'Đóng phòng & rời đi' },
        );
      }
    </script>
    <script>
      function setTheme(t) {
        const html = document.documentElement;
        if (t === 'white') {
          html.classList.remove('dark');
        } else {
          html.classList.add('dark');
          html.setAttribute('data-theme', t);
        }
        document.querySelectorAll('[data-theme-btn]').forEach((b) => {
          b.dataset.active = b.dataset.themeBtn === t ? 'true' : 'false';
        });
      }
    </script>

    <!-- ===== Shared toast + confirm-sheet system (lm* helpers) ===== -->
    <div
      id="lmToastStack"
      class="fixed bottom-24 md:bottom-8 inset-x-0 z-[300] flex flex-col items-center gap-2 px-4 pointer-events-none"
    ></div>
    <div id="lmConfirmOverlay" class="fixed inset-0 z-[310] hidden">
      <div
        class="absolute inset-0 bg-black/50"
        onclick="lmCloseConfirm()"
      ></div>
      <div
        id="lmConfirmPanel"
        class="absolute bottom-0 inset-x-0 max-w-[430px] mx-auto bg-white dark:bg-surf rounded-t-3xl p-6 pb-8 translate-y-full transition-transform duration-300"
      >
        <div
          class="w-10 h-1.5 rounded-full bg-slate-200 dark:bg-white/10 mx-auto mb-5"
        ></div>
        <p id="lmConfirmTitle" class="font-bold text-lg mb-1.5">Tiêu đề</p>
        <p
          id="lmConfirmMsg"
          class="text-sm text-slate-500 dark:text-slate-400 mb-5 leading-relaxed"
        >
          Nội dung
        </p>
        <div id="lmConfirmExtra"></div>
        <div class="flex gap-3">
          <button
            onclick="lmCloseConfirm()"
            class="flex-1 py-3 rounded-2xl font-bold text-sm bg-slate-100 dark:bg-surf2"
          >
            Huỷ
          </button>
          <button
            id="lmConfirmActionBtn"
            class="flex-1 py-3 rounded-2xl font-bold text-sm text-white bg-gradient-to-br from-irisl to-irisl"
          >
            Xác nhận
          </button>
        </div>
      </div>
    </div>
    <script>
      // Scope the overlay/toast stack to the visible app-frame (if one exists on this page)
      // instead of the full browser viewport -- otherwise on a wide PC screen the backdrop
      // bleeds across the whole window instead of just the app card.
      function lmSyncFrame() {
        var frame = document.querySelector('[data-lm-frame]');
        var overlay = document.getElementById('lmConfirmOverlay');
        var stack = document.getElementById('lmToastStack');
        if (!frame) {
          overlay.style.cssText = '';
          stack.style.cssText = '';
          return;
        }
        var r = frame.getBoundingClientRect();
        overlay.style.cssText =
          'position:fixed;left:' +
          r.left +
          'px;top:' +
          r.top +
          'px;width:' +
          r.width +
          'px;height:' +
          r.height +
          'px;right:auto;bottom:auto;';
        stack.style.cssText =
          'position:fixed;left:' +
          r.left +
          'px;width:' +
          r.width +
          'px;bottom:' +
          (window.innerHeight - r.bottom + 24) +
          'px;top:auto;right:auto;';
      }
      window.addEventListener('resize', lmSyncFrame);
      window.addEventListener('orientationchange', lmSyncFrame);

      function lmToast(msg, opts) {
        opts = opts || {};
        lmSyncFrame();
        var stack = document.getElementById('lmToastStack');
        if (!stack) return;
        var el = document.createElement('div');
        el.className =
          'pointer-events-auto max-w-[92%] flex items-center gap-2 px-4 py-3 rounded-2xl shadow-xl shadow-black/10 text-sm font-semibold ' +
          (opts.tone === 'warn'
            ? 'bg-rose-500 text-white'
            : 'bg-ink text-white dark:bg-white dark:text-ink');
        el.style.opacity = '0';
        el.style.transform = 'translateY(8px)';
        el.style.transition = 'all .2s ease';
        el.innerHTML =
          '<span>' +
          (opts.icon || (opts.tone === 'warn' ? '⚠️' : '✓')) +
          '</span><span>' +
          msg +
          '</span>';
        stack.appendChild(el);
        requestAnimationFrame(function () {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
        setTimeout(function () {
          el.style.opacity = '0';
          el.style.transform = 'translateY(8px)';
          setTimeout(function () {
            el.remove();
          }, 200);
        }, 2600);
      }
      var lmConfirmCallback = null;
      function lmConfirm(title, msg, onConfirm, opts) {
        opts = opts || {};
        lmSyncFrame();
        document.getElementById('lmConfirmTitle').textContent = title;
        document.getElementById('lmConfirmMsg').textContent = msg;
        document.getElementById('lmConfirmExtra').innerHTML =
          opts.extraHtml || '';
        var btn = document.getElementById('lmConfirmActionBtn');
        btn.textContent = opts.actionLabel || 'Xác nhận';
        btn.className =
          'flex-1 py-3 rounded-2xl font-bold text-sm text-white ' +
          (opts.tone === 'danger'
            ? 'bg-rose-500'
            : 'bg-gradient-to-br from-irisl to-irisl');
        lmConfirmCallback = onConfirm || null;
        document.getElementById('lmConfirmOverlay').classList.remove('hidden');
        requestAnimationFrame(function () {
          document
            .getElementById('lmConfirmPanel')
            .classList.remove('translate-y-full');
        });
      }
      function lmCloseConfirm() {
        var panel = document.getElementById('lmConfirmPanel');
        panel.classList.add('translate-y-full');
        setTimeout(function () {
          document.getElementById('lmConfirmOverlay').classList.add('hidden');
          document.getElementById('lmConfirmActionBtn').style.display = '';
        }, 300);
      }
      document
        .getElementById('lmConfirmActionBtn')
        .addEventListener('click', function () {
          var cb = lmConfirmCallback;
          lmCloseConfirm();
          if (cb) cb();
        });
    </script>
  </body>
</html>
