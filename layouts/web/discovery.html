        --aqua: 242 166 90;
        --aqual: 242 166 90;

        --iris: 232 67 31;

        --aqual: 245 164 40;

      }
      .theme-dot[data-active='true'] {

          0 0 0 3px rgb(var(--irisl));
      }

          avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=Ngoc',
        },
        {
          name: 'Bảo, 23–27',
          meta: '8 km · hoạt động 3 giờ trước',
          bio: 'Yêu thể thao, đang tập gym đều 3 buổi/tuần.',
          tags: ['Gym', 'Bóng đá', 'Ẩm thực'],
          avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=Bao',
        },
        {
          name: 'Vy, 20–25',
          meta: '3 km · đang hoạt động',
          bio: 'Mê du lịch bụi, đã đi qua 12 tỉnh thành năm nay.',
          tags: ['Du lịch', 'Nhiếp ảnh', 'Indie'],
          avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=VyD',
        },
        {
          name: 'Hùng, 28–32',
          meta: '6 km · hoạt động 30 phút trước',
          bio: 'Đầu bếp tay ngang, cuối tuần hay nấu ăn đãi bạn bè.',
          tags: ['Nấu ăn', 'Rượu vang', 'Nhạc jazz'],
          avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=Hung',
        },
      ];
      function openSheet(i) {
        const p = profiles[i];
        document.getElementById('sheetAvatar').src = p.avatar;
        document.getElementById('sheetName').textContent = p.name;
        document.getElementById('sheetMeta').textContent = p.meta;
        document.getElementById('sheetBio').textContent = p.bio;
        document.getElementById('sheetTags').innerHTML = p.tags
          .map(
            (t) =>
              `<span class="text-xs font-semibold px-2.5 py-1 rounded-full bg-iris/10 text-irisl">${t}</span>`,
          )
          .join('');
        var frame = document.querySelector('[data-lm-frame]');
        var sheetWrap = document.getElementById('detailSheet');
        if (frame) {
          var r = frame.getBoundingClientRect();
          sheetWrap.style.cssText =
            'position:fixed;left:' +
            r.left +
            'px;top:' +
            r.top +
            'px;width:' +
            r.width +
            'px;height:' +
            r.height +
            'px;right:auto;bottom:auto;z-index:50;';
        }
        sheetWrap.classList.remove('hidden');
        requestAnimationFrame(() =>
          document
            .getElementById('sheetPanel')
            .classList.remove('translate-y-full'),
        );
      }
      function closeSheet() {
        document.getElementById('sheetPanel').classList.add('translate-y-full');
        setTimeout(
          () => document.getElementById('detailSheet').classList.add('hidden'),
          300,
        );
      }
    </script>
    <script>
      function setTheme(t) {
        const html = document.documentElement;
        if (t === 'white') {
          html.classList.remove('dark');
        } else {
          html.classList.add('dark');
          html.setAttribute('data-theme', t);
        }
        document.querySelectorAll('[data-theme-btn]').forEach((b) => {
          b.dataset.active = b.dataset.themeBtn === t ? 'true' : 'false';
        });
      }
    </script>

    <!-- ===== Shared toast + confirm-sheet system (lm* helpers) ===== -->
    <div
      id="lmToastStack"
      class="fixed bottom-24 md:bottom-8 inset-x-0 z-[300] flex flex-col items-center gap-2 px-4 pointer-events-none"
    ></div>
    <div id="lmConfirmOverlay" class="fixed inset-0 z-[310] hidden">
      <div
        class="absolute inset-0 bg-black/50"
        onclick="lmCloseConfirm()"
      ></div>
      <div
        id="lmConfirmPanel"
        class="absolute bottom-0 inset-x-0 max-w-[430px] mx-auto bg-white dark:bg-surf rounded-t-3xl p-6 pb-8 translate-y-full transition-transform duration-300"
      >
        <div
          class="w-10 h-1.5 rounded-full bg-slate-200 dark:bg-white/10 mx-auto mb-5"
        ></div>
        <p id="lmConfirmTitle" class="font-bold text-lg mb-1.5">Tiêu đề</p>
        <p
          id="lmConfirmMsg"
          class="text-sm text-slate-500 dark:text-slate-400 mb-5 leading-relaxed"
        >
          Nội dung
        </p>
        <div id="lmConfirmExtra"></div>
        <div class="flex gap-3">
          <button
            onclick="lmCloseConfirm()"
            class="flex-1 py-3 rounded-2xl font-bold text-sm bg-slate-100 dark:bg-surf2"
          >
            Huỷ
          </button>
          <button
            id="lmConfirmActionBtn"
            class="flex-1 py-3 rounded-2xl font-bold text-sm text-white bg-gradient-to-br from-irisl to-irisl"
          >
            Xác nhận
          </button>
        </div>
      </div>
    </div>
    <script>
      // Scope the overlay/toast stack to the visible app-frame (if one exists on this page)
      // instead of the full browser viewport -- otherwise on a wide PC screen the backdrop
      // bleeds across the whole window instead of just the app card.
      function lmSyncFrame() {
        var frame = document.querySelector('[data-lm-frame]');
        var overlay = document.getElementById('lmConfirmOverlay');
        var stack = document.getElementById('lmToastStack');
        if (!frame) {
          overlay.style.cssText = '';
          stack.style.cssText = '';
          return;
        }
        var r = frame.getBoundingClientRect();
        overlay.style.cssText =
          'position:fixed;left:' +
          r.left +
          'px;top:' +
          r.top +
          'px;width:' +
          r.width +
          'px;height:' +
          r.height +
          'px;right:auto;bottom:auto;';
        stack.style.cssText =
          'position:fixed;left:' +
          r.left +
          'px;width:' +
          r.width +
          'px;bottom:' +
          (window.innerHeight - r.bottom + 24) +
          'px;top:auto;right:auto;';
      }
      window.addEventListener('resize', lmSyncFrame);
      window.addEventListener('orientationchange', lmSyncFrame);

      function lmToast(msg, opts) {
        opts = opts || {};
        lmSyncFrame();
        var stack = document.getElementById('lmToastStack');
        if (!stack) return;
        var el = document.createElement('div');
        el.className =
          'pointer-events-auto max-w-[92%] flex items-center gap-2 px-4 py-3 rounded-2xl shadow-xl shadow-black/10 text-sm font-semibold ' +
          (opts.tone === 'warn'
            ? 'bg-rose-500 text-white'
            : 'bg-ink text-white dark:bg-white dark:text-ink');
        el.style.opacity = '0';
        el.style.transform = 'translateY(8px)';
        el.style.transition = 'all .2s ease';
        el.innerHTML =
          '<span>' +
          (opts.icon || (opts.tone === 'warn' ? '⚠️' : '✓')) +
          '</span><span>' +
          msg +
          '</span>';
        stack.appendChild(el);
        requestAnimationFrame(function () {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
        setTimeout(function () {
          el.style.opacity = '0';
          el.style.transform = 'translateY(8px)';
          setTimeout(function () {
            el.remove();
          }, 200);
        }, 2600);
      }
      var lmConfirmCallback = null;
      function lmConfirm(title, msg, onConfirm, opts) {
        opts = opts || {};
        lmSyncFrame();
        document.getElementById('lmConfirmTitle').textContent = title;
        document.getElementById('lmConfirmMsg').textContent = msg;
        document.getElementById('lmConfirmExtra').innerHTML =
          opts.extraHtml || '';
        var btn = document.getElementById('lmConfirmActionBtn');
        btn.textContent = opts.actionLabel || 'Xác nhận';
        btn.className =
          'flex-1 py-3 rounded-2xl font-bold text-sm text-white ' +
          (opts.tone === 'danger'
            ? 'bg-rose-500'
            : 'bg-gradient-to-br from-irisl to-irisl');
        lmConfirmCallback = onConfirm || null;
        document.getElementById('lmConfirmOverlay').classList.remove('hidden');
        requestAnimationFrame(function () {
          document
            .getElementById('lmConfirmPanel')
            .classList.remove('translate-y-full');
        });
      }
      function lmCloseConfirm() {
        var panel = document.getElementById('lmConfirmPanel');
        panel.classList.add('translate-y-full');
        setTimeout(function () {
          document.getElementById('lmConfirmOverlay').classList.add('hidden');
          document.getElementById('lmConfirmActionBtn').style.display = '';
        }, 300);
      }
      document
        .getElementById('lmConfirmActionBtn')
        .addEventListener('click', function () {
          var cb = lmConfirmCallback;
          lmCloseConfirm();
          if (cb) cb();
        });
    </script>
  </body>
</html>
