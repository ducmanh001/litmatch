# Overlay tùy chọn gửi metrics + Docker logs lên Grafana Cloud Free.
# Chạy cùng base + dev: pnpm observability:up
services:
  alloy:
    image: grafana/alloy:v1.17.1@sha256:4f6ddc56ffdcf8a6316748fc5162972e20cb301523cac1bb4a31957df733ae9b
    command:
      [
        'run',
        '--server.http.listen-addr=0.0.0.0:12345',
        '--storage.path=/var/lib/alloy/data',
        '--disable-reporting',
        '/etc/alloy/config.alloy',
      ]
    environment:
      DEPLOY_ENVIRONMENT: ${DEPLOY_ENVIRONMENT:-development}
      GRAFANA_CLOUD_PROMETHEUS_URL: ${GRAFANA_CLOUD_PROMETHEUS_URL:?required}
      GRAFANA_CLOUD_PROMETHEUS_USER: ${GRAFANA_CLOUD_PROMETHEUS_USER:?required}
      GRAFANA_CLOUD_LOKI_URL: ${GRAFANA_CLOUD_LOKI_URL:?required}
      GRAFANA_CLOUD_LOKI_USER: ${GRAFANA_CLOUD_LOKI_USER:?required}
      GRAFANA_CLOUD_API_TOKEN: ${GRAFANA_CLOUD_API_TOKEN:?required}
    volumes:
      - ./observability/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - '127.0.0.1:12345:12345'
    depends_on:
      core-api:
        condition: service_healthy
      signaling-gateway:
        condition: service_healthy
      livekit:
        condition: service_started
    restart: unless-stopped

volumes:
  alloy_data:
