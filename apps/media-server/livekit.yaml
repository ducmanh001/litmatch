# Cấu hình LiveKit self-host cho dev local (docs/03 § 3.8.A — SFU đã chốt là LiveKit).
# Media server KHÔNG chứa business logic (docs/03 § 3.3) — chỉ là config + deployment.
# Production: keys lấy từ secret manager, không commit key thật vào repo.
port: 7880
# Prometheus metrics nội bộ của LiveKit (docs/07 Giai đoạn 6) — cổng riêng, khác control port
prometheus_port: 6789
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
  # Không set thì LiveKit tự lấy IP nội bộ của container (Docker bridge network) làm ICE
  # candidate — thiết bị ngoài máy dev (điện thoại test qua LAN) không bao giờ route tới được,
  # dù WebSocket signaling vẫn "connect" bình thường (audio câm, không phải lỗi kết nối rõ ràng).
  # Cần test qua LAN: set DEV_LAN_IP trong .env; Compose truyền giá trị qua NODE_IP native.
redis:
  address: host.docker.internal:6379
# Key/secret được inject bằng LIVEKIT_KEYS từ .env, không lưu trong YAML tracked.
# Webhook về core-api — mỗi module lọc theo prefix room của mình (call-* / party-*),
# chữ ký JWT ký bằng api_key được verify ở controller trước khi tin (docs/10 § Calling/Party Room)
webhook:
  # Key ký webhook được inject bằng LIVEKIT_WEBHOOK_API_KEY từ cùng LIVEKIT_API_KEY.
  urls:
    # PHẢI khớp API_GLOBAL_PREFIX ('api/v1', core-api/src/app/openapi.ts) — thiếu prefix này
    # khiến LiveKit POST 404 âm thầm, call không bao giờ chuyển active/startedAt (phát hiện qua
    # UX audit 2026-07-14: voice call không lên đồng hồ đếm giờ vì webhook chưa từng tới nơi).
    - http://host.docker.internal:3000/api/v1/calling/webhooks/livekit
    - http://host.docker.internal:3000/api/v1/party/webhooks/livekit
logging:
  level: info
