# Cấu hình LiveKit self-host cho dev local (docs/03 § 3.8.A — SFU đã chốt là LiveKit).
# Media server KHÔNG chứa business logic (docs/03 § 3.3) — chỉ là config + deployment.
# Production: keys lấy từ secret manager, không commit key thật vào repo.
port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50200
  use_external_ip: false
redis:
  address: host.docker.internal:6379
keys:
  # DEV ONLY — sinh key thật bằng `livekit-server generate-keys` khi deploy
  devkey: devsecret_change_me_0123456789abcdef
# Webhook về core-api — mỗi module lọc theo prefix room của mình (call-* / party-*),
# chữ ký JWT ký bằng api_key được verify ở controller trước khi tin (docs/10 § Calling/Party Room)
webhook:
  api_key: devkey
  urls:
    - http://host.docker.internal:3000/calling/webhooks/livekit
    - http://host.docker.internal:3000/party/webhooks/livekit
logging:
  level: info
